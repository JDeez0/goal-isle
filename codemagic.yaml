# Codemagic CI/CD for Goal Isle iOS
# This config embeds Apple credentials as variables — no UI setup needed.
# Just add the PRIVATE_KEY as a secret in Codemagic → Global variables and secrets.

workflows:
  ios-workflow:
    name: Goal Isle iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      vars:
        APP_STORE_CONNECT_ISSUER_ID: c0820edb-f931-4829-85b2-4a89532cee90
        APP_STORE_CONNECT_KEY_IDENTIFIER: 8N59492275
        # APP_STORE_CONNECT_PRIVATE_KEY must be added as a SECRET in:
        # Personal account settings → Global variables and secrets → Add
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Set up iOS code signing from API key
        script: |
          # Write the private key to a temp file for Codemagic signing
          if [ -n "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/auth_key.p8
            # Use Codemagic's keychain integration
            keychain initialize
            app-store-connect fetch-signing-files "com.jasperdeen.goalisle" \
              --platform IOS \
              --type APP_STORE \
              --create
            keychain add-certificates
          else
            echo "WARNING: APP_STORE_CONNECT_PRIVATE_KEY not set — building without signing"
          fi
      - name: Build iOS
        script: |
          flutter build ipa --release \
            --export-options ios/exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
