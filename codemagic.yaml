# Codemagic CI/CD for Goal Isle iOS
# Docs: https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/

workflows:
  ios-workflow:
    name: Goal Isle iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jasperdeen.goalisle
      vars:
        APP_STORE_CONNECT_ISSUER_ID: c0820edb-f931-4829-85b2-4a89532cee90
        APP_STORE_CONNECT_KEY_IDENTIFIER: 8N59492275
        # The private key goes in Codemagic UI as a secure environment variable
        # (see step 4 below — don't put it in this file)
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build iOS
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
