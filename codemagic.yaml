# Codemagic CI/CD for Goal Isle iOS
# Simplified — uses Codemagic's native signing block

workflows:
  ios-workflow:
    name: Goal Isle iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jasperdeen.goalisle
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build iOS IPA
        script: |
          flutter build ipa --release --no-codesign
      - name: Sign and export IPA
        script: |
          # Find the Xcode archive produced by flutter build
          ARCHIVE=$(ls -d build/ios/archive/*.xcarchive 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "No archive found — flutter build ipa may have failed"
            exit 1
          fi
          echo "Found archive: $ARCHIVE"

          # Export unsigned IPA from the archive
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE" \
            -exportPath build/ios/ipa/ \
            -exportOptionsPlist ios/exportOptions.plist \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
