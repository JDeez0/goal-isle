# Codemagic CI/CD for Goal Isle iOS
# Docs: https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/

workflows:
  ios-workflow:
    name: Goal Isle iOS
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
      vars:
        APP_STORE_CONNECT_ISSUER_ID: c0820edb-f931-4829-85b2-4a89532cee90
        APP_STORE_CONNECT_KEY_IDENTIFIER: 8N59492275
        # APP_STORE_CONNECT_PRIVATE_KEY — set as secret in app settings
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Build iOS IPA
        script: |
          # Write the private key to a temp file for Codemagic signing
          if [ -n "$APP_STORE_CONNECT_PRIVATE_KEY" ]; then
            echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/auth_key.p8
            keychain initialize
            app-store-connect fetch-signing-files "com.jasperdeen.goalisle" \
              --platform IOS \
              --type APP_STORE \
              --create
            keychain add-certificates
          else
            echo "WARNING: APP_STORE_CONNECT_PRIVATE_KEY not set — building unsigned"
          fi
          # Build the IPA
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/ipa/*.dSYM.zip
