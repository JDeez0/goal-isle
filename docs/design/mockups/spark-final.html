<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Isle — Spark (locked)</title>
<style>
  :root {
    --ink:#1F2937; --muted:#64748B; --faint:#94A3B8; --line:#ECEFF2;
    --accent:#3B82F6; --accent-dk:#2563EB; --accent-soft:rgba(59,130,246,0.14);
    --sparkle:#FBBF24; --water-top:#EEF2F5; --water-bot:#E6ECF1; --surface:#FFFFFF;
    --dull:#F4F6F8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Segoe UI',Roboto,sans-serif;
    background:radial-gradient(130% 90% at 50% 0%,#F1F5F9 0%,#E6ECF1 55%,#DCE3EA 100%);
    color:var(--ink); padding:50px 24px 80px; -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  .page { max-width:820px; margin:0 auto; }
  .doc-title { font-size:13px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--accent); margin-bottom:44px; }
  .doc-title::before { content:''; display:inline-block; width:22px; height:2px;
    background:var(--accent); vertical-align:middle; margin-right:10px; }

  .block { background:var(--surface); margin-bottom:18px; padding:40px; border:1px solid var(--line); }
  .block-tag { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--faint); margin-bottom:32px; }

  /* =========================================================
     THE SPARK — locked treatment
     parallelogram (skewX) + border-radius (rounds→hardens)
     + soft aura behind + counter-skewed emoji
     ========================================================= */
  .spark {
    position: relative;
    width: 130px; height: 130px;
    display: flex; align-items: center; justify-content: center;
  }

  /* aura — blurred glow behind, also skewed to match */
  .aura {
    position: absolute;
    width: 96px; height: 96px;
    transform: skewX(-14deg);
    border-radius: 40% 22% 40% 22%;
    transition: all 550ms ease-out;
    z-index: 0;
  }

  /* the parallelogram body — skewX for the lean, border-radius for the edges */
  .body {
    position: relative;
    width: 96px; height: 96px;
    transform: skewX(-14deg);
    display: flex; align-items: center; justify-content: center;
    transition: border-radius 650ms cubic-bezier(0.34,1.2,0.64,1),
                background 400ms ease-out, box-shadow 400ms ease-out;
    z-index: 2;
  }

  /* emoji counter-skewed to stay upright */
  .e {
    font-size: 50px; line-height: 1; user-select: none;
    transform: skewX(14deg);
    transition: filter 400ms ease-out;
    z-index: 3; position: relative;
  }

  .sparkle {
    position: absolute; color: var(--sparkle); line-height: 1; pointer-events: none;
    z-index: 4; opacity: 0; transition: opacity 400ms ease-out 150ms;
    transform: skewX(14deg); /* counter-skew like the emoji */
  }

  /* ---- UNCOMPLETED: soft rounded parallelogram, faint ---- */
  .spark.uncomp .body {
    border-radius: 40% 22% 40% 22%;
    background: var(--dull);
    box-shadow: inset 0 0 0 1px rgba(31,41,55,0.06);
  }
  .spark.uncomp .aura {
    background: radial-gradient(ellipse, rgba(100,116,139,0.10), transparent 70%);
    filter: blur(10px);
  }
  .spark.uncomp .e { filter: saturate(0.3) opacity(0.5); }

  /* ---- LIT: hardened sharp parallelogram, glow + tint ---- */
  .spark.lit .body {
    border-radius: 6% 6% 6% 6%;
    background: linear-gradient(135deg, var(--surface), var(--accent-soft));
    box-shadow: 0 0 0 1.5px var(--accent), 0 6px 22px rgba(59,130,246,0.22);
  }
  .spark.lit .aura {
    background: radial-gradient(ellipse, rgba(59,130,246,0.35), rgba(59,130,246,0.06) 55%, transparent 75%);
    filter: blur(7px);
    border-radius: 6px; /* aura also tightens */
  }
  .spark.lit .e { filter: saturate(1.15); }
  .spark.lit .sparkle { opacity: 0.65; }

  /* badge — skewed to match the lean */
  .badge {
    position: absolute; top: 2px; right: 2px; z-index: 5;
    background: var(--accent); color: #fff; font-size: 12px; font-weight: 800;
    min-width: 22px; height: 22px; padding: 0 6px;
    display: flex; align-items: center; justify-content: center;
    transform: skewX(-14deg);
    box-shadow: 0 1px 3px rgba(59,130,246,0.4);
  }
  .badge span { transform: skewX(14deg); display: block; }

  /* ===== showcase ===== */
  .pair { display:flex; gap:70px; align-items:flex-end; justify-content:center; flex-wrap:wrap; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .lbl { font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--faint); }
  .lbl.win { color:var(--accent); }

  /* morph demo */
  .morph-wrap { display:flex; flex-direction:column; align-items:center; gap:32px; }
  .morph-wrap .spark { width:170px; height:170px; }
  .morph-wrap .aura { width:120px; height:120px; }
  .morph-wrap .body { width:120px; height:120px; }
  .morph-wrap .e { font-size:64px; }
  .morph-wrap .sparkle.s1 { top:20px; right:30px; font-size:18px; }
  .morph-wrap .sparkle.s2 { bottom:26px; left:24px; font-size:13px; }
  .toggle { display:flex; gap:32px; }
  .toggle button {
    font:inherit; font-size:14px; font-weight:600; background:none; border:none; cursor:pointer;
    color:var(--faint); padding:6px 4px; border-bottom:2px solid transparent; transition:all 150ms ease-out;
  }
  .toggle button.on { color:var(--ink); border-bottom-color:var(--accent); }

  /* home preview */
  .home { background:linear-gradient(180deg,var(--water-top),var(--water-bot)); height:340px;
    position:relative; overflow:hidden; border:1px solid var(--line); }
  .home .floating { position:absolute; animation:bob 6s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);} }
  .home .spark { width:74px; height:74px; }
  .home .aura { width:56px; height:56px; }
  .home .body { width:56px; height:56px; }
  .home .e { font-size:30px; }
  .home .badge { font-size:10px; min-width:18px; height:18px; top:0; right:0; }
  .home .sparkle { font-size:10px; }
  .home-top { display:flex; justify-content:space-between; align-items:center; padding:14px 20px; }
  .home-top button { font:inherit; font-size:14px; font-weight:600; background:none; border:none;
    cursor:pointer; color:var(--accent); }
  .home-top .muted { color:var(--faint); }
  .create { position:absolute; bottom:20px; right:22px; width:56px; height:56px;
    transform:skewX(-14deg); border:2px dashed var(--faint); border-radius:20px;
    background:transparent; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all 150ms ease-out; }
  .create span { transform:skewX(14deg); font-size:26px; font-weight:700; color:var(--faint); }
  .create:hover { border-color:var(--muted); }
  .create:hover span { color:var(--muted); }
</style>
</head>
<body>
<div class="page">
  <div class="doc-title">Spark · locked</div>

  <!-- ===== TWO STATES ===== -->
  <div class="block">
    <div class="block-tag">Uncompleted → lit · same shape, edges harden</div>
    <div class="pair">
      <div class="cell">
        <div class="spark uncomp">
          <div class="aura"></div>
          <div class="body"><span class="e">💪</span></div>
        </div>
        <span class="lbl">Uncompleted</span>
      </div>
      <div class="cell">
        <div class="spark lit">
          <div class="aura"></div>
          <div class="body">
            <span class="sparkle" style="top:12px;right:16px;font-size:16px;">✦</span>
            <span class="sparkle" style="bottom:14px;left:12px;font-size:11px;">✦</span>
            <span class="e">💪</span>
          </div>
        </div>
        <span class="lbl win">Lit</span>
      </div>
      <div class="cell">
        <div class="spark lit">
          <div class="aura"></div>
          <div class="body">
            <div class="badge"><span>8</span></div>
            <span class="sparkle" style="top:12px;right:18px;font-size:14px;">✦</span>
            <span class="e">💪</span>
          </div>
        </div>
        <span class="lbl">Lit + streak</span>
      </div>
    </div>
  </div>

  <!-- ===== LIVE MORPH ===== -->
  <div class="block">
    <div class="block-tag">Live · tap to harden</div>
    <div class="morph-wrap">
      <div class="spark uncomp" id="ms">
        <div class="aura"></div>
        <div class="body">
          <span class="sparkle s1">✦</span>
          <span class="sparkle s2">✦</span>
          <span class="e">💪</span>
        </div>
      </div>
      <div class="toggle" id="mt">
        <button class="on" data-s="uncomp">Uncompleted</button>
        <button data-s="lit">Lit</button>
      </div>
    </div>
  </div>

  <!-- ===== HOME PREVIEW ===== -->
  <div class="block">
    <div class="block-tag">Home · sparks among flat chrome</div>
    <div class="home">
      <div class="home-top">
        <button class="muted">Back</button>
        <button>Done</button>
      </div>
      <div class="floating" style="top:40px;left:50px;animation-delay:0s;">
        <div class="spark lit"><div class="aura"></div><div class="body">
          <span class="sparkle" style="top:6px;right:10px;font-size:9px;">✦</span><span class="e">💪</span>
        </div></div>
      </div>
      <div class="floating" style="top:70px;left:170px;animation-delay:1.1s;">
        <div class="spark lit"><div class="aura"></div><div class="body">
          <div class="badge"><span>8</span></div>
          <span class="sparkle" style="top:5px;right:8px;font-size:7px;">✦</span><span class="e">🏃</span>
        </div></div>
      </div>
      <div class="floating" style="top:140px;left:100px;animation-delay:0.5s;">
        <div class="spark uncomp"><div class="aura"></div><div class="body"><span class="e">📚</span></div></div>
      </div>
      <div class="floating" style="top:120px;right:70px;animation-delay:1.8s;">
        <div class="spark lit"><div class="aura"></div><div class="body">
          <span class="sparkle" style="top:5px;right:8px;font-size:7px;">✦</span><span class="e">🧘</span>
        </div></div>
      </div>
      <div class="floating" style="top:210px;right:140px;animation-delay:1.5s;">
        <div class="spark uncomp"><div class="aura"></div><div class="body"><span class="e">💧</span></div></div>
      </div>
      <button class="create"><span>?</span></button>
    </div>
  </div>

</div>

<script>
  const ms = document.getElementById('ms');
  document.getElementById('mt').addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    ms.className = 'spark ' + b.dataset.s;
    [...e.currentTarget.children].forEach(c => c.classList.toggle('on', c === b));
  });
</script>
</body>
</html>
