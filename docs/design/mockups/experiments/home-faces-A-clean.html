<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Isle — Home (one face per Isle)</title>
<style>
  /* ============================================================
     GOAL ISLE · HOME — one face per Isle.
     Sparks use the EXACT original sz-home treatment from app.html
     (64px / 48px body / 30px emoji, skew + aura). Nothing added
     to the spark itself — no ring, no badge, no streak.
     Each spark = one Isle's main spark. Streaks live elsewhere.
     ============================================================ */
  :root {
    --bg:#EEF2F5; --water-top:#EEF2F5; --water-bot:#E6ECF1; --surface:#FFFFFF;
    --ink:#1F2937; --muted:#64748B; --faint:#94A3B8; --line:#ECEFF2;
    --accent:#3B82F6; --accent-dk:#2563EB; --accent-soft:rgba(59,130,246,0.14);
    --sparkle:#FBBF24; --dull:#F4F6F8; --frame:#0F172A; --grey:#CBD5E1;
    --spark-r:40% 22% 40% 22%;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Segoe UI',Roboto,sans-serif;
    background:radial-gradient(130% 90% at 50% 0%,#F1F5F9 0%,#E6ECF1 55%,#DCE3EA 100%);
    color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:30px 20px 60px;-webkit-font-smoothing:antialiased;}
  .app-title{font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--accent);margin-bottom:6px;}
  .app-title::before{content:'';display:inline-block;width:18px;height:2px;background:var(--accent);
    vertical-align:middle;margin-right:8px;}
  .app-sub{font-size:12px;color:var(--faint);margin-bottom:22px;max-width:332px;text-align:center;line-height:1.4;}

  .phone{width:332px;height:700px;border-radius:46px;border:10px solid var(--frame);
    background:linear-gradient(180deg,var(--water-top) 0%,var(--water-bot) 100%);
    box-shadow:0 30px 60px rgba(15,23,42,0.22),0 6px 14px rgba(15,23,42,0.08);
    position:relative;overflow:hidden;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:104px;height:24px;
    background:var(--frame);border-bottom-left-radius:15px;border-bottom-right-radius:15px;z-index:50;}

  /* ===== SPARK — exact original treatment (copied from app.html) ===== */
  .spark{position:relative;display:flex;align-items:center;justify-content:center;}
  .aura{position:absolute;transform:skewX(-14deg);border-radius:var(--spark-r);transition:all 550ms ease-out;z-index:0;}
  .body{position:relative;transform:skewX(-14deg);border-radius:var(--spark-r);display:flex;
    align-items:center;justify-content:center;transition:background 400ms ease-out,box-shadow 400ms ease-out;z-index:2;}
  .e{line-height:1;user-select:none;transform:skewX(14deg);transition:filter 400ms ease-out;z-index:3;position:relative;}
  .sparkle{position:absolute;color:var(--sparkle);line-height:1;pointer-events:none;z-index:4;opacity:0;
    transition:opacity 400ms ease-out 150ms;transform:skewX(14deg);}
  .spark.uncomp .body{background:var(--dull);box-shadow:inset 0 0 0 1px rgba(31,41,55,0.06);}
  .spark.uncomp .aura{background:radial-gradient(ellipse,rgba(100,116,139,0.10),transparent 70%);filter:blur(10px);}
  .spark.uncomp .e{filter:saturate(0.3) opacity(0.5);}
  .spark.lit .body{background:linear-gradient(135deg,var(--surface),var(--accent-soft));
    box-shadow:0 0 0 1.5px var(--accent),0 6px 22px rgba(59,130,246,0.22);}
  .spark.lit .aura{background:radial-gradient(ellipse,rgba(59,130,246,0.35),rgba(59,130,246,0.06) 55%,transparent 75%);filter:blur(7px);}
  .spark.lit .e{filter:saturate(1.15);}
  .spark.lit .sparkle{opacity:0.65;}
  .spark.greyed .body{background:#E8EBEF;box-shadow:none;}
  .spark.greyed .aura{display:none;}
  .spark.greyed .e{filter:grayscale(1) opacity(0.42);}
  /* sz-home — UNCHANGED from original, except emoji at normal size */
  .spark.sz-home{width:64px;height:64px;}
  .spark.sz-home .aura,.spark.sz-home .body{width:48px;height:48px;}
  .spark.sz-home .e{font-size:34px;}

  /* ===== HOME canvas — same structure as app.html ===== */
  .home-canvas{flex:1;position:absolute;inset:0;overflow:hidden;}
  .home-cell{position:absolute;cursor:pointer;transform:translate(-50%,-50%);}
  .home-bob{animation:bob 6s ease-in-out infinite;transition:transform 150ms ease-out;display:block;}
  .home-cell:active .home-bob{transform:scale(0.95);}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

  /* confirm pulse — a main spark whose metric rule is met (wordless) */
  .spark.confirm-pulse .body{animation:cpulse 1.6s ease-in-out infinite;}
  @keyframes cpulse{
    0%,100%{box-shadow:0 0 0 1.5px var(--accent),0 6px 22px rgba(59,130,246,0.22),0 0 0 0 rgba(59,130,246,0.40);}
    50%{box-shadow:0 0 0 1.5px var(--accent),0 6px 22px rgba(59,130,246,0.30),0 0 0 11px rgba(59,130,246,0);}
  }

  /* create button — unchanged */
  .create-pin{position:absolute;bottom:66px;right:22px;z-index:10;}
  .create-btn{width:58px;height:58px;border:2px dashed var(--faint);border-radius:var(--spark-r);
    transform:skewX(-14deg);background:transparent;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all 150ms ease-out;}
  .create-btn span{transform:skewX(14deg);font-size:26px;font-weight:700;color:var(--faint);}
  .create-btn:hover{border-color:var(--muted);}
  .create-btn:hover span{color:var(--muted);}

  .bottom-bar{position:absolute;left:0;right:0;bottom:0;height:50px;background:rgba(255,255,255,0.82);
    backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;align-items:center;
    justify-content:center;gap:28px;z-index:20;}
  .nav-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;color:var(--faint);
    display:flex;align-items:center;justify-content:center;transition:color 150ms ease-out;}
  .nav-btn svg{width:22px;height:22px;}
  .nav-btn.active{color:var(--accent);}
  .nav-btn:hover{color:var(--muted);}

  .you-avatar{position:absolute;top:46px;right:18px;width:36px;height:36px;border-radius:50%;
    background:var(--surface);border:1px solid var(--line);font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:30;
    box-shadow:0 1px 3px rgba(31,41,55,0.08);transition:transform 150ms ease-out;}
  .you-avatar:hover{transform:scale(1.05);}
  .you-avatar:active{transform:scale(0.95);}

  .water-shimmer{position:absolute;inset:0;pointer-events:none;z-index:0;opacity:0.35;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.22), transparent 25%),
      radial-gradient(circle at 80% 60%, rgba(255,255,255,0.18), transparent 30%),
      radial-gradient(circle at 50% 85%, rgba(255,255,255,0.14), transparent 28%);
    animation:shimmer 18s ease-in-out infinite alternate;}
  @keyframes shimmer{0%{transform:translate(0,0) scale(1);}100%{transform:translate(-8px,4px) scale(1.05);}}
</style>
</head>
<body>
<div class="app-title">Goal Isle · Home</div>
<div class="app-sub">one face per Isle · sparks unchanged · no streaks on Home</div>

<div class="phone">
  <div class="notch"></div>
  <div class="water-shimmer"></div>

  <div class="home-canvas">

    <!-- LSAT crew — main spark (weekly avg), pulsing: rule met, awaiting confirm -->
    <div class="home-cell" style="top:24%; left:32%;"
         onclick="alert('LSAT crew — weekly avg improved. Tap to confirm.')">
      <div class="home-bob">
        <div class="spark sz-home lit confirm-pulse">
          <div class="aura"></div>
          <div class="body"><span class="e">📈</span></div>
          <div class="sparkle" style="top:-2px;left:-4px;">✦</div>
          <div class="sparkle" style="bottom:0;right:0;font-size:9px;">✦</div>
        </div>
      </div>
    </div>

    <!-- Morning runners — main spark lit -->
    <div class="home-cell" style="top:27%; left:68%;"
         onclick="alert('Morning runners')">
      <div class="home-bob" style="animation-delay:-2s;">
        <div class="spark sz-home lit">
          <div class="aura"></div>
          <div class="body"><span class="e">🏃</span></div>
          <div class="sparkle" style="top:-2px;right:-2px;">✦</div>
        </div>
      </div>
    </div>

    <!-- HLS '26 — main spark missed, greyed, sunk toward bottom -->
    <div class="home-cell" style="top:64%; left:38%;"
         onclick="alert('HLS — missed')">
      <div class="home-bob" style="animation-delay:-4s;">
        <div class="spark sz-home greyed">
          <div class="body"><span class="e">🎓</span></div>
        </div>
      </div>
    </div>

    <!-- Book club — bare Isle face (no main spark), not done yet -->
    <div class="home-cell" style="top:62%; left:70%;"
         onclick="alert('Book club')">
      <div class="home-bob" style="animation-delay:-1s;">
        <div class="spark sz-home uncomp">
          <div class="aura"></div>
          <div class="body"><span class="e">📖</span></div>
        </div>
      </div>
    </div>

  </div>

  <div class="create-pin">
    <button class="create-btn" onclick="alert('Create a new spark')"><span>?</span></button>
  </div>

  <div class="bottom-bar">
    <button class="nav-btn" aria-label="Notes" onclick="alert('Notes feed')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
    <button class="nav-btn active" aria-label="Home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></button>
    <button class="nav-btn" aria-label="League" onclick="alert('League rankings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.24C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.24C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg></button>
  </div>

  <button class="you-avatar" onclick="alert('You — Isles, Friends, Profile, Settings')">🧑</button>

</div>
</body>
</html>
