<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Isle — Home Territories (exploration)</title>
<style>
  /* ============================================================
     ❌ REJECTED (July 4, 2026) — territory-blob approach.
     Grouping sparks loosely on tinted Isle regions was a bad
     solution: too busy, blobs looked arbitrary/puddly, density
     breaks past ~4 Isles, and the clustering read as separate
     things rather than one calm water surface.
     REPLACED BY: one face per Isle on Home (home-faces-*.html).
     Kept here as a record of the dead end. Do not revive.
     ============================================================
     (original notes below — v2 spec §9 territory layout laws) */
  :root {
    --bg:#EEF2F5; --water-top:#EEF2F5; --water-bot:#E6ECF1; --surface:#FFFFFF;
    --ink:#1F2937; --muted:#64748B; --faint:#94A3B8; --line:#ECEFF2;
    --accent:#3B82F6; --accent-dk:#2563EB; --accent-soft:rgba(59,130,246,0.14);
    --sparkle:#FBBF24; --dull:#F4F6F8; --frame:#0F172A; --grey:#CBD5E1;
    --spark-r:40% 22% 40% 22%;
    /* Isle territory tints — curated calm hues (creator-chosen from this swatch) */
    --isle-blue: 59,130,246;      /* blue */
    --isle-green: 16,185,129;     /* emerald */
    --isle-amber: 245,158,11;     /* amber */
    --isle-violet: 139,92,246;    /* violet */
    --isle-rose: 244,114,182;     /* rose */
    --isle-teal: 20,184,166;      /* teal */
    --isle-orange:249,115,22;     /* orange */
    --isle-indigo:99,102,241;     /* indigo */
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro','Segoe UI',Roboto,sans-serif;
    background:radial-gradient(130% 90% at 50% 0%,#F1F5F9 0%,#E6ECF1 55%,#DCE3EA 100%);
    color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:30px 20px 60px;-webkit-font-smoothing:antialiased;}
  .app-title{font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--accent);margin-bottom:6px;}
  .app-title::before{content:'';display:inline-block;width:18px;height:2px;background:var(--accent);
    vertical-align:middle;margin-right:8px;}
  .app-sub{font-size:12px;color:var(--faint);margin-bottom:22px;max-width:332px;text-align:center;line-height:1.4;}

  /* ===== PHONE ===== */
  .phone{width:332px;height:700px;border-radius:46px;border:10px solid var(--frame);
    background:linear-gradient(180deg,var(--water-top) 0%,var(--water-bot) 100%);
    box-shadow:0 30px 60px rgba(15,23,42,0.22),0 6px 14px rgba(15,23,42,0.08);
    position:relative;overflow:hidden;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:104px;height:24px;
    background:var(--frame);border-bottom-left-radius:15px;border-bottom-right-radius:15px;z-index:50;}

  /* ===== SPARK (copied from app.html — locked visual language) ===== */
  .spark{position:relative;display:flex;align-items:center;justify-content:center;}
  .aura{position:absolute;transform:skewX(-14deg);border-radius:var(--spark-r);transition:all 550ms ease-out;z-index:0;}
  .body{position:relative;transform:skewX(-14deg);border-radius:var(--spark-r);display:flex;
    align-items:center;justify-content:center;transition:background 400ms ease-out,box-shadow 400ms ease-out;z-index:2;}
  .e{line-height:1;user-select:none;transform:skewX(14deg);transition:filter 400ms ease-out;z-index:3;position:relative;}
  .sparkle{position:absolute;color:var(--sparkle);line-height:1;pointer-events:none;z-index:4;opacity:0;
    transition:opacity 400ms ease-out 150ms;transform:skewX(14deg);}
  .spark.uncomp .body{background:var(--dull);box-shadow:inset 0 0 0 1px rgba(31,41,55,0.06);}
  .spark.uncomp .aura{background:radial-gradient(ellipse,rgba(100,116,139,0.10),transparent 70%);filter:blur(10px);}
  .spark.uncomp .e{filter:saturate(0.3) opacity(0.5);}
  .spark.lit .body{background:linear-gradient(135deg,var(--surface),var(--accent-soft));
    box-shadow:0 0 0 1.5px var(--accent),0 6px 22px rgba(59,130,246,0.22);}
  .spark.lit .aura{background:radial-gradient(ellipse,rgba(59,130,246,0.35),rgba(59,130,246,0.06) 55%,transparent 75%);filter:blur(7px);}
  .spark.lit .e{filter:saturate(1.15);}
  .spark.lit .sparkle{opacity:0.65;}
  .spark.greyed .body{background:#EDEFF2;box-shadow:none;}
  .spark.greyed .aura{display:none;}
  .spark.greyed .e{filter:grayscale(1) opacity(0.45);}
  .badge{position:absolute;top:2px;right:2px;z-index:5;background:var(--accent);color:#fff;
    font-size:11px;font-weight:800;min-width:20px;height:20px;padding:0 5px;display:flex;
    align-items:center;justify-content:center;transform:skewX(-14deg);box-shadow:0 1px 3px rgba(59,130,246,0.4);}
  .badge span{transform:skewX(14deg);display:block;}
  .spark.sz-home{width:64px;height:64px;}
  .spark.sz-home .aura,.spark.sz-home .body{width:48px;height:48px;}
  .spark.sz-home .e{font-size:30px;}
  .spark.sz-home .badge{font-size:9px;min-width:16px;height:16px;top:-2px;right:-2px;}

  /* ===== TERRITORY ===== */
  .home-canvas{position:absolute;inset:0;overflow:hidden;}
  .territory{
    position:absolute;
    /* soft tinted region — no coastline, no border, just a wash of the isle's color */
    background:radial-gradient(120% 100% at 50% 40%, rgba(var(--isle),0.10), rgba(var(--isle),0.04) 60%, transparent 80%);
    border-radius:36% 30% 36% 30% / 30% 36% 30% 36%;
    transition:background 600ms ease-out;
  }
  .territory:hover{background:radial-gradient(120% 100% at 50% 40%, rgba(var(--isle),0.14), rgba(var(--isle),0.06) 60%, transparent 80%);}
  /* subtle isle label chip — tiny, faint, bottom of each territory */
  .isle-chip{
    position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
    font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;
    color:rgba(var(--isle),0.65);
    background:rgba(255,255,255,0.6);padding:3px 8px;border-radius:8px;
    backdrop-filter:blur(4px);
    pointer-events:none;white-space:nowrap;
  }
  /* sparks inside a territory — absolute, with the bob animation */
  .spark-cell{position:absolute;transform:translate(-50%,-50%);cursor:pointer;}
  .spark-bob{animation:bob 6s ease-in-out infinite;transition:transform 150ms ease-out;display:block;}
  .spark-cell:active .spark-bob{transform:scale(0.95);}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

  /* expand chevron on personal sparks */
  .expand-chev{
    position:absolute;bottom:-2px;right:-6px;z-index:6;
    width:20px;height:20px;border-radius:50%;background:var(--surface);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 1px 3px rgba(31,41,55,0.12);
    transform:skewX(-14deg);transition:transform 150ms ease-out;
  }
  .expand-chev svg{width:11px;height:11px;color:var(--muted);transform:skewX(14deg);}
  .expand-chev:hover{transform:skewX(-14deg) scale(1.1);}
  .expand-chev.open svg{transform:skewX(14deg) rotate(180deg);}
  /* per-member mini cluster — fades in when expanded */
  .member-cluster{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    display:flex;gap:4px;z-index:1;opacity:0;pointer-events:none;
    transition:opacity 250ms ease-out;
  }
  .spark-cell.expanded .member-cluster{opacity:1;pointer-events:auto;}
  .member-cluster .spark{opacity:0.85;}
  .member-cluster .spark .mlabel{position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);
    font-size:8px;color:var(--faint);font-weight:600;white-space:nowrap;}

  /* hybrid confirm pulse — wordless, on a metric spark whose rule is met */
  .spark.confirm-pulse .body{animation:cpulse 1.6s ease-in-out infinite;}
  @keyframes cpulse{
    0%,100%{box-shadow:0 0 0 1.5px var(--accent),0 6px 22px rgba(59,130,246,0.22),0 0 0 0 rgba(59,130,246,0.4);}
    50%{box-shadow:0 0 0 1.5px var(--accent),0 6px 22px rgba(59,130,246,0.30),0 0 0 10px rgba(59,130,246,0);}
  }

  /* create button — fixed bottom-right */
  .create-pin{position:absolute;bottom:66px;right:22px;z-index:10;}
  .create-btn{width:58px;height:58px;border:2px dashed var(--faint);border-radius:var(--spark-r);
    transform:skewX(-14deg);background:transparent;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all 150ms ease-out;}
  .create-btn span{transform:skewX(14deg);font-size:26px;font-weight:700;color:var(--faint);}
  .create-btn:hover{border-color:var(--muted);}
  .create-btn:hover span{color:var(--muted);}

  /* bottom nav */
  .bottom-bar{position:absolute;left:0;right:0;bottom:0;height:50px;background:rgba(255,255,255,0.82);
    backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;align-items:center;
    justify-content:center;gap:28px;z-index:20;}
  .nav-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;color:var(--faint);
    display:flex;align-items:center;justify-content:center;transition:color 150ms ease-out;}
  .nav-btn svg{width:22px;height:22px;}
  .nav-btn.active{color:var(--accent);}

  /* you-avatar */
  .you-avatar{position:absolute;top:46px;right:18px;width:36px;height:36px;border-radius:50%;
    background:var(--surface);border:1px solid var(--line);font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;z-index:30;
    box-shadow:0 1px 3px rgba(31,41,55,0.08);transition:transform 150ms ease-out;}
  .you-avatar:hover{transform:scale(1.05);}

  /* water shimmer — very subtle moving gradient to sell "water" */
  .water-shimmer{
    position:absolute;inset:0;pointer-events:none;z-index:0;opacity:0.5;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.25), transparent 25%),
      radial-gradient(circle at 80% 60%, rgba(255,255,255,0.20), transparent 30%),
      radial-gradient(circle at 50% 85%, rgba(255,255,255,0.15), transparent 28%);
    animation:shimmer 18s ease-in-out infinite alternate;
  }
  @keyframes shimmer{
    0%{transform:translate(0,0) scale(1);}
    100%{transform:translate(-8px,4px) scale(1.05);}
  }

  /* hint text for empty/first state */
  .hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;
    color:var(--faint);font-size:13px;line-height:1.5;max-width:200px;z-index:1;}

  /* legend (outside phone, for the reviewer) */
  .legend{margin-top:24px;display:flex;flex-wrap:wrap;gap:8px 18px;justify-content:center;max-width:360px;
    font-size:11px;color:var(--muted);}
  .legend .lk{display:inline-flex;align-items:center;gap:6px;}
  .legend .dot{width:10px;height:10px;border-radius:3px;}
</style>
</head>
<body>
<div class="app-title">Goal Isle · v2 exploration</div>
<div class="app-sub">Home with Isle territories — sparks grouped on soft tinted regions. First try.</div>

<div class="phone">
  <div class="notch"></div>
  <div class="water-shimmer"></div>

  <!-- HOME CANVAS -->
  <div class="home-canvas" id="homeCanvas">

    <!-- ===== TERRITORY 1: LSAT study group (blue) — top-left ===== -->
    <div class="territory" style="--isle:var(--isle-blue); top:78px; left:14px; width:200px; height:240px;">
      <div class="isle-chip">⚖️ LSAT crew</div>

      <!-- weekly avg metric spark (personal, lit, streaked) — floats to top -->
      <div class="spark-cell" style="top:34%; left:32%;">
        <div class="spark-bob">
          <div class="spark sz-home lit confirm-pulse" onclick="alert('weekly avg spark — pulsing, ready to confirm')">
            <div class="aura"></div><div class="body"><span class="e">📈</span></div>
            <div class="badge"><span>4</span></div>
            <div class="sparkle" style="top:-2px;left:-4px;">✦</div>
            <div class="sparkle" style="bottom:0;right:0;font-size:9px;">✦</div>
          </div>
        </div>
      </div>

      <!-- daily study ritual (shared, lit) -->
      <div class="spark-cell" style="top:50%; left:64%;">
        <div class="spark-bob">
          <div class="spark sz-home lit" onclick="alert('daily study — shared, lit')">
            <div class="aura"></div><div class="body"><span class="e">📚</span></div>
            <div class="sparkle" style="top:0;right:-2px;">✦</div>
          </div>
        </div>
      </div>

      <!-- timed sections (personal, greyed — missed, sunk to bottom of region) -->
      <div class="spark-cell" style="top:78%; left:40%;">
        <div class="spark-bob">
          <div class="spark sz-home greyed" onclick="alert('timed sections — missed, greyed, sunk')">
            <div class="body"><span class="e">⏱️</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== TERRITORY 2: Morning runners (green) — top-right ===== -->
    <div class="territory" style="--isle:var(--isle-green); top:90px; right:12px; width:160px; height:170px;">
      <div class="isle-chip">🏃 runners</div>

      <div class="spark-cell" style="top:40%; left:50%;">
        <div class="spark-bob">
          <div class="spark sz-home lit" onclick="alert('morning run — lit')">
            <div class="aura"></div><div class="body"><span class="e">🏃</span></div>
            <div class="badge"><span>12</span></div>
            <div class="sparkle" style="top:-2px;right:-2px;">✦</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== TERRITORY 3: Harvard admitted 2026 (violet) — bottom-left ===== -->
    <div class="territory" style="--isle:var(--isle-violet); bottom:96px; left:20px; width:170px; height:160px;">
      <div class="isle-chip">🎓 HLS '26</div>

      <!-- a personal spark, expandable to show other members -->
      <div class="spark-cell" id="personalSpark" style="top:38%; left:45%;">
        <div class="spark-bob">
          <div class="spark sz-home lit" onclick="alert('my acceptance ritual — tap chevron to see others')">
            <div class="aura"></div><div class="body"><span class="e">🎓</span></div>
            <div class="sparkle" style="top:-2px;left:-2px;">✦</div>
          </div>
        </div>
        <div class="expand-chev" id="expandChev" onclick="toggleExpand(event)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="member-cluster">
          <div class="spark sz-mini greyed"><div class="body"><span class="e">🎓</span></div><div class="mlabel">Sam</div></div>
          <div class="spark sz-mini lit"><div class="aura"></div><div class="body"><span class="e">🎓</span></div><div class="mlabel">Priya</div></div>
          <div class="spark sz-mini greyed"><div class="body"><span class="e">🎓</span></div><div class="mlabel">Diego</div></div>
        </div>
      </div>
    </div>

    <!-- ===== TERRITORY 4: Reading club (amber) — bottom-right-ish ===== -->
    <div class="territory" style="--isle:var(--isle-amber); bottom:110px; right:24px; width:140px; height:140px;">
      <div class="isle-chip">📖 book club</div>
      <div class="spark-cell" style="top:45%; left:50%;">
        <div class="spark-bob">
          <div class="spark sz-home uncomp" onclick="alert('reading — not done yet today, dull')">
            <div class="aura"></div><div class="body"><span class="e">📖</span></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- CREATE BUTTON -->
  <div class="create-pin">
    <button class="create-btn" onclick="alert('Create a new spark in the current Isle')"><span>?</span></button>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-bar">
    <button class="nav-btn" aria-label="Notes" onclick="alert('Notes feed')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
    <button class="nav-btn active" aria-label="Home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg></button>
    <button class="nav-btn" aria-label="League" onclick="alert('League rankings')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.24C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.24C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg></button>
  </div>

  <!-- YOU AVATAR -->
  <button class="you-avatar" onclick="alert('You menu — Friends, Profile, App Settings, Isles')">🧑</button>

</div>

<div class="legend">
  <span class="lk"><span class="dot" style="background:rgb(var(--isle-blue));"></span>LSAT crew</span>
  <span class="lk"><span class="dot" style="background:rgb(var(--isle-green));"></span>Runners</span>
  <span class="lk"><span class="dot" style="background:rgb(var(--isle-violet));"></span>HLS '26</span>
  <span class="lk"><span class="dot" style="background:rgb(var(--isle-amber));"></span>Book club</span>
  <span class="lk" style="color:var(--accent)">·</span>
  <span class="lk">⬤ lit</span>
  <span class="lk" style="opacity:0.5">⬤ greyed (sunk)</span>
  <span class="lk">📈 = pulsing (confirm)</span>
</div>

<script>
  function toggleExpand(e){
    e.stopPropagation();
    const cell = document.getElementById('personalSpark');
    const chev = document.getElementById('expandChev');
    cell.classList.toggle('expanded');
    chev.classList.toggle('open');
  }
</script>
</body>
</html>
