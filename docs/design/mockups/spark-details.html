<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Goal Isle — Spark Details</title>
<style>
  /* ============================================================
     GOAL ISLE · Spark Details — expandable card pattern
     Spark shape is FIXED (chosen at create). State = color/glow only.
     Chrome = straight lines, flat, minimal. Word buttons ≤5 letters.
     No sentences. No box behind emoji except the spark body.
     ============================================================ */
  :root {
    --bg:        #EEF2F5;
    --surface:   #FFFFFF;
    --ink:       #1F2937;
    --muted:     #64748B;
    --faint:     #94A3B8;
    --line:      #ECEFF2;
    --accent:    #3B82F6;
    --accent-dk: #2563EB;
    --accent-soft: rgba(59,130,246,0.14);
    --sparkle:   #FBBF24;
    --dull:      #F4F6F8;
    --frame:     #0F172A;
    /* spark shape — fixed (the rhomboid chosen at create) */
    --spark-r: 40% 22% 40% 22%;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(130% 90% at 50% 0%, #F1F5F9 0%, #E6ECF1 60%, #DCE3EA 100%);
    color: var(--ink); min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 24px; -webkit-font-smoothing: antialiased;
  }
  .stage { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; }

  /* ===== PHONE ===== */
  .phone {
    width: 332px; height: 700px; border-radius: 46px; border: 10px solid var(--frame);
    background: linear-gradient(180deg, var(--bg) 0%, #E6ECF1 100%);
    box-shadow: 0 30px 60px rgba(15,23,42,0.22), 0 6px 14px rgba(15,23,42,0.08);
    position: relative; overflow: hidden; display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 104px; height: 24px; background: var(--frame); border-bottom-left-radius: 15px;
    border-bottom-right-radius: 15px; z-index: 50; }

  /* ===== SPARK (locked, shape fixed via --spark-r) ===== */
  .spark { position: relative; display: flex; align-items: center; justify-content: center; }
  .aura { position: absolute; transform: skewX(-14deg); border-radius: var(--spark-r);
    transition: all 550ms ease-out; z-index: 0; }
  .body { position: relative; transform: skewX(-14deg); border-radius: var(--spark-r);
    display: flex; align-items: center; justify-content: center;
    transition: background 400ms ease-out, box-shadow 400ms ease-out; z-index: 2; }
  .e { line-height: 1; user-select: none; transform: skewX(14deg);
    transition: filter 400ms ease-out; z-index: 3; position: relative; }
  .sparkle { position: absolute; color: var(--sparkle); line-height: 1; pointer-events: none;
    z-index: 4; opacity: 0; transition: opacity 400ms ease-out 150ms; transform: skewX(14deg); }
  .spark.uncomp .body { background: var(--dull); box-shadow: inset 0 0 0 1px rgba(31,41,55,0.06); }
  .spark.uncomp .aura { background: radial-gradient(ellipse, rgba(100,116,139,0.10), transparent 70%); filter: blur(10px); }
  .spark.uncomp .e { filter: saturate(0.3) opacity(0.5); }
  .spark.lit .body { background: linear-gradient(135deg, var(--surface), var(--accent-soft));
    box-shadow: 0 0 0 1.5px var(--accent), 0 6px 22px rgba(59,130,246,0.22); }
  .spark.lit .aura { background: radial-gradient(ellipse, rgba(59,130,246,0.35), rgba(59,130,246,0.06) 55%, transparent 75%); filter: blur(7px); }
  .spark.lit .e { filter: saturate(1.15); }
  .spark.lit .sparkle { opacity: 0.65; }
  .badge { position: absolute; top: 2px; right: 2px; z-index: 5; background: var(--accent); color: #fff;
    font-size: 12px; font-weight: 800; min-width: 22px; height: 22px; padding: 0 6px;
    display: flex; align-items: center; justify-content: center; transform: skewX(-14deg);
    box-shadow: 0 1px 3px rgba(59,130,246,0.4); }
  .badge span { transform: skewX(14deg); display: block; }
  /* sizes */
  .spark.sz-hero { width: 120px; height: 120px; }
  .spark.sz-hero .aura, .spark.sz-hero .body { width: 90px; height: 90px; }
  .spark.sz-hero .e { font-size: 48px; }
  .spark.sz-dep { width: 54px; height: 54px; }
  .spark.sz-dep .aura, .spark.sz-dep .body { width: 40px; height: 40px; }
  .spark.sz-dep .e { font-size: 22px; }
  .spark.sz-dep .badge { font-size: 9px; min-width: 15px; height: 15px; top: 0; right: 0; }
  .spark.sz-mini { width: 36px; height: 36px; }
  .spark.sz-mini .aura, .spark.sz-mini .body { width: 28px; height: 28px; }
  .spark.sz-mini .e { font-size: 15px; }
  .spark.sz-mini .badge { font-size: 8px; min-width: 13px; height: 13px; top: -1px; right: -1px; }

  /* ===== TOP BAR ===== */
  .topbar { display: flex; align-items: center; padding: 44px 14px 10px; gap: 8px; }
  .tb-btn { background: none; border: none; cursor: pointer; color: var(--accent);
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  .tb-btn svg { width: 22px; height: 22px; }
  .tb-spacer { width: 32px; flex-shrink: 0; }
  .title { flex: 1; display: flex; align-items: center; justify-content: center; gap: 9px;
    cursor: pointer; padding: 2px 6px; }
  .title .chev { width: 14px; height: 14px; color: var(--faint); transition: transform 220ms ease-out; }
  .title.open .chev { transform: rotate(180deg); }

  /* ===== EXPANDABLE CARD ===== */
  .card-wrap { padding: 0 16px; }
  .card { background: var(--surface); border: 1px solid var(--line);
    box-shadow: 0 4px 14px rgba(31,41,55,0.06); overflow: hidden; border-radius: 16px; }
  .card-top { display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 26px 20px 20px; cursor: pointer; }
  .meta-row { display: flex; align-items: center; gap: 12px; color: var(--faint); }
  .meta-row .g { display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 700; color: var(--muted); }
  .meta-row .g svg { width: 14px; height: 14px; }
  .meta-row .sep { color: var(--line); }
  .card-expand { max-height: 0; overflow: hidden; transition: max-height 320ms ease-out; }
  .card.open .card-expand { max-height: 340px; }
  .recipe { padding: 4px 20px 22px; display: flex; flex-direction: column; align-items: center; gap: 10px;
    border-top: 1px solid var(--line); margin-top: 4px; }
  .rc-deps { display: flex; gap: 18px; justify-content: center; padding-top: 14px; }
  .rc-eq { font-size: 18px; font-weight: 800; color: var(--faint); line-height: 1; }

  /* ===== ACTION ROWS ===== */
  .actions { margin: 16px 16px 0; background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; overflow: hidden; }
  .act { display: flex; align-items: center; gap: 14px; padding: 16px 18px; cursor: pointer;
    transition: background 150ms ease-out; border-bottom: 1px solid var(--line); }
  .act:last-child { border-bottom: none; }
  .act:hover { background: #FAFBFC; }
  .act.cta { background: var(--accent-soft); }
  .act.cta:hover { background: rgba(59,130,246,0.20); }
  .act .ic { width: 20px; height: 20px; color: var(--muted); flex-shrink: 0; }
  .act.cta .ic { color: var(--accent); }
  .act .ic svg { width: 20px; height: 20px; }
  .act .val { font-size: 14px; color: var(--ink); font-weight: 500; }
  .act.cta .val { color: var(--accent-dk); font-weight: 700; }
  .act .chev { margin-left: auto; color: var(--faint); }
  .act .chev svg { width: 16px; height: 16px; }

  /* ===== DEV CONTROLS ===== */
  .controls { width: 250px; flex-shrink: 0; }
  .controls h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--faint);
    margin-bottom: 16px; font-weight: 700; }
  .ctl { margin-bottom: 16px; }
  .ctl-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .checks { display: flex; flex-direction: column; gap: 8px; }
  .check { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
  .check input { accent-color: var(--accent); width: 16px; height: 16px; }
  .seg { display: inline-flex; background: #F1F5F9; border-radius: 8px; padding: 3px; }
  .seg button { font: inherit; font-size: 12px; font-weight: 600; padding: 6px 12px; border: none;
    background: none; cursor: pointer; color: var(--muted); border-radius: 6px; transition: all 150ms ease-out; }
  .seg button.on { background: #fff; color: var(--ink); box-shadow: 0 1px 2px rgba(31,41,55,0.08); }
  .stepper { display: inline-flex; align-items: center; gap: 10px; }
  .stepper button { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--line);
    background: #fff; cursor: pointer; font-size: 16px; color: var(--ink); }
  .stepper b { font-size: 14px; min-width: 18px; text-align: center; }
</style>
</head>
<body>
<div class="stage">
  <div class="phone">
    <div class="notch"></div>

    <div class="topbar">
      <button class="tb-btn" aria-label="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="title" id="title">
        <div class="spark sz-mini uncomp" id="titleSpark">
          <div class="aura"></div><div class="body"><span class="e">💪</span></div>
        </div>
        <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <span class="tb-spacer"></span>
    </div>

    <div class="card-wrap">
      <div class="card" id="card">
        <div class="card-top" id="cardTop">
          <div class="spark sz-hero uncomp" id="heroSpark">
            <div class="aura"></div>
            <div class="body">
              <span class="sparkle" style="top:12px;right:14px;font-size:14px;">✦</span>
              <span class="sparkle" style="bottom:12px;left:12px;font-size:10px;">✦</span>
              <span class="e">💪</span>
            </div>
          </div>
          <div class="meta-row">
            <span class="g">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
              <span id="gTimer">2/3</span>
            </span>
            <span class="sep">·</span>
            <span class="g">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1-2 .5-4 2-5.5C13 6 14.5 8 16 9.5c1.5 1.5 2.5 3 2.5 4.5a6.5 6.5 0 1 1-13 0c0-1 .5-2 1-2.5"/></svg>
              <span id="gStreak">3</span>
            </span>
          </div>
        </div>
        <div class="card-expand">
          <div class="recipe" id="recipe"></div>
        </div>
      </div>
    </div>

    <div class="actions">
      <div class="act" id="membersAct">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3.5 20a5.5 5.5 0 0 1 11 0"/><path d="M16 5.2a3.2 3.2 0 0 1 0 6.1"/><path d="M17.5 14.3a5.5 5.5 0 0 1 3 4.9"/></svg></span>
        <span class="val" id="membersVal">3</span>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </div>
      <div class="act" id="chatAct">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
        <span class="val" id="chatVal">Light</span>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </div>
      <div class="act" id="settingsAct">
        <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        <span class="val">Edit</span>
        <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
      </div>
    </div>
  </div>

  <div class="controls">
    <h3>Dev · preview</h3>
    <div class="ctl">
      <div class="ctl-label">Recipe</div>
      <div class="seg" id="modeSeg">
        <button data-mode="multi" class="on">Multi</button>
        <button data-mode="nodep">No-dep</button>
      </div>
    </div>
    <div class="ctl" id="depsCtl">
      <div class="ctl-label">Deps satisfied</div>
      <div class="checks" id="depChecks">
        <label class="check"><input type="checkbox" data-i="0" checked> 🏃</label>
        <label class="check"><input type="checkbox" data-i="1" checked> 💧</label>
        <label class="check"><input type="checkbox" data-i="2"> 🧘</label>
      </div>
    </div>
    <div class="ctl" id="postedCtl" style="display:none;">
      <div class="ctl-label">Posted</div>
      <div class="seg" id="postedSeg">
        <button data-posted="0" class="on">No</button>
        <button data-posted="1">Yes</button>
      </div>
    </div>
    <div class="ctl">
      <div class="ctl-label">Streak</div>
      <div class="stepper">
        <button id="streakDown">−</button><b id="streakVal">3</b><button id="streakUp">+</button>
      </div>
    </div>
    <div class="ctl">
      <div class="ctl-label">Access</div>
      <div class="seg" id="accessSeg">
        <button data-access="creator" class="on">Creator</button>
        <button data-access="member">Member</button>
      </div>
    </div>
  </div>
</div>

<script>
  const DEPS = [{emoji:'🏃'},{emoji:'💧'},{emoji:'🧘'}];
  const HERO='💪', NODEP_HERO='📚';
  let state = { mode:'multi', sat:[true,true,false], posted:false, streak:3, access:'creator', cardOpen:false };
  const $ = id => document.getElementById(id);
  const allMet = () => state.mode==='multi' ? state.sat.every(Boolean) : state.posted;
  const heroEmoji = () => state.mode==='multi' ? HERO : NODEP_HERO;

  function sparkEl(emoji, lit, sz, badgeNum) {
    const badge = (lit && badgeNum) ? `<div class="badge"><span>${badgeNum}</span></div>` : '';
    const sparkles = lit ? `<span class="sparkle" style="top:10px;right:12px;font-size:13px;">✦</span><span class="sparkle" style="bottom:10px;left:10px;font-size:9px;">✦</span>` : '';
    return `<div class="spark ${sz} ${lit?'lit':'uncomp'}"><div class="aura"></div><div class="body">${badge}${sparkles}<span class="e">${emoji}</span></div></div>`;
  }

  function render() {
    const lit = allMet();
    const showBadge = lit && state.streak >= 2;

    $('heroSpark').outerHTML = `<div class="spark sz-hero ${lit?'lit':'uncomp'}" id="heroSpark"><div class="aura"></div><div class="body">${showBadge?`<div class="badge"><span>${state.streak}</span></div>`:''}${lit?'<span class="sparkle" style="top:12px;right:14px;font-size:14px;">✦</span><span class="sparkle" style="bottom:12px;left:12px;font-size:10px;">✦</span>':''}<span class="e">${heroEmoji()}</span></div></div>`;

    $('titleSpark').outerHTML = `<div class="spark sz-mini ${lit?'lit':'uncomp'}" id="titleSpark"><div class="aura"></div><div class="body">${showBadge?`<div class="badge"><span>${state.streak}</span></div>`:''}<span class="e">${heroEmoji()}</span></div></div>`;

    $('gTimer').textContent = state.mode==='multi' ? `${state.sat.filter(Boolean).length}/${DEPS.length}` : (state.posted?'✓':'·');
    $('gStreak').textContent = state.streak;

    const recipe = $('recipe');
    if (state.mode==='multi') {
      recipe.innerHTML = `<div class="rc-deps">${DEPS.map((d,i)=>sparkEl(d.emoji,state.sat[i],'sz-dep')).join('')}</div><div class="rc-eq">=</div>${sparkEl(heroEmoji(),lit,'sz-dep')}`;
    } else {
      recipe.innerHTML = sparkEl(heroEmoji(),lit,'sz-dep');
    }

    $('chatAct').classList.toggle('cta', !lit);
    $('chatVal').textContent = lit ? 'Chat' : 'Light';
    $('settingsAct').style.display = state.access==='creator' ? 'flex' : 'none';
  }

  function toggleCard() {
    state.cardOpen = !state.cardOpen;
    $('card').classList.toggle('open', state.cardOpen);
    $('title').classList.toggle('open', state.cardOpen);
  }
  $('cardTop').addEventListener('click', toggleCard);
  $('title').addEventListener('click', toggleCard);

  $('modeSeg').addEventListener('click', e => { const b=e.target.closest('button'); if(!b)return;
    state.mode=b.dataset.mode; [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b));
    $('depsCtl').style.display=state.mode==='multi'?'block':'none';
    $('postedCtl').style.display=state.mode==='nodep'?'block':'none'; render(); });

  $('depChecks').addEventListener('change', e => { state.sat[+e.target.dataset.i]=e.target.checked; render(); });

  $('postedSeg').addEventListener('click', e => { const b=e.target.closest('button'); if(!b)return;
    state.posted=b.dataset.posted==='1'; [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b)); render(); });

  $('streakUp').addEventListener('click',()=>{state.streak++;$('streakVal').textContent=state.streak;render();});
  $('streakDown').addEventListener('click',()=>{state.streak=Math.max(0,state.streak-1);$('streakVal').textContent=state.streak;render();});

  $('accessSeg').addEventListener('click', e => { const b=e.target.closest('button'); if(!b)return;
    state.access=b.dataset.access; [...e.currentTarget.children].forEach(c=>c.classList.toggle('on',c===b)); render(); });

  $('chatAct').addEventListener('click', () => { if(!state.cardOpen) toggleCard(); });

  render();
</script>
</body>
</html>
