<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Isle - Working Mockup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0A0E17;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Sparse Lines Background */
        .background-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(55, 65, 81, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(55, 65, 81, 0.15) 1px, transparent 1px);
            background-size: 80px 80px;
            pointer-events: none;
            z-index: 0;
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #60A5FA, #34D399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #60A5FA, #34D399);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* Mountain Visual */
        .mountain-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 300px;
            z-index: 0;
            pointer-events: none;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .mountain {
            width: 0;
            height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-bottom: 200px solid rgba(96, 165, 250, 0.3);
            position: relative;
        }

        .mountain::before {
            content: '';
            position: absolute;
            top: 20px;
            left: -100px;
            width: 0;
            height: 0;
            border-left: 100px solid transparent;
            border-right: 100px solid transparent;
            border-bottom: 150px solid rgba(52, 211, 153, 0.3);
        }

        /* Main Content */
        .main-content {
            display: flex;
            gap: 30px;
            margin-bottom: 350px; /* Space for mountain */
        }

        /* Isle Grid */
        .isle-section {
            flex: 1;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            color: white;
        }

        .isle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        /* Isle Card */
        .isle-card {
            background: linear-gradient(135deg, #1A1F2E 0%, #252B3D 100%);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(55, 65, 81, 0.5);
            position: relative;
            overflow: hidden;
        }

        .isle-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #60A5FA, #34D399);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .isle-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: #60A5FA;
        }

        .isle-card:hover::before {
            opacity: 1;
        }

        .isle-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .isle-emoji {
            font-size: 48px;
        }

        .isle-mass {
            background: rgba(96, 165, 250, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 14px;
            color: #60A5FA;
            font-weight: 600;
        }

        .isle-name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: white;
        }

        .isle-description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.5;
        }

        .isle-stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Spark Button */
        .spark-button {
            background: linear-gradient(135deg, #1A1F2E 0%, #252B3D 100%);
            border: 2px solid rgba(55, 65, 81, 0.5);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            min-width: 200px;
        }

        .spark-button:hover {
            transform: scale(1.05);
            border-color: #60A5FA;
            box-shadow: 0 10px 30px rgba(96, 165, 250, 0.3);
        }

        .spark-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .spark-text {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .spark-subtext {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(180deg, #1A1F2E 0%, #0A0E17 100%);
            border-radius: 24px 24px 0 0;
            width: 100%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .modal-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .modal-body {
            padding: 30px;
        }

        .modal-section {
            margin-bottom: 30px;
        }

        .modal-section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #60A5FA;
        }

        .sub-points-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sub-point-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sub-point-emoji {
            font-size: 24px;
        }

        .sub-point-content {
            flex: 1;
        }

        .sub-point-description {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .sub-point-progress {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .sub-point-button {
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid #60A5FA;
            border-radius: 8px;
            padding: 8px 16px;
            color: #60A5FA;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sub-point-button:hover {
            background: #60A5FA;
            color: white;
        }

        .modal-footer {
            padding: 20px 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-button {
            width: 100%;
            background: linear-gradient(135deg, #60A5FA, #34D399);
            border: none;
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .chat-button:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(96, 165, 250, 0.4);
        }

        .close-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .isle-grid {
                grid-template-columns: 1fr;
            }
            
            .modal {
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="background-lines"></div>
    
    <div class="mountain-container">
        <div class="mountain"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="logo">🏝️ Goal Isle</div>
            <div class="user-info">
                <span>Welcome back!</span>
                <div class="avatar">👤</div>
            </div>
        </header>

        <div class="main-content">
            <div class="isle-section">
                <div class="section-header">
                    <h1 class="section-title">Your Isles</h1>
                </div>
                
                <div class="isle-grid" id="isleGrid">
                    <!-- Isles will be populated by JavaScript -->
                </div>
            </div>

            <div class="create-section">
                <div class="spark-button" onclick="createIsle()">
                    <div class="spark-emoji">✨</div>
                    <div class="spark-text">Spark</div>
                    <div class="spark-subtext">Create new isle</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal" id="modal">
            <button class="close-button" onclick="closeModal()">×</button>
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Isle Name</div>
                <div class="modal-subtitle" id="modalSubtitle">Mass: 0</div>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <h3 class="modal-section-title">📋 Daily Tasks</h3>
                    <div class="sub-points-list" id="subPointsList">
                        <!-- Sub-points will be populated by JavaScript -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="chat-button" onclick="openChat()">💬 Open Chat</button>
            </div>
        </div>
    </div>

    <script>
        // Mock Data
        let isles = [
            {
                id: 1,
                name: 'Fitness Journey',
                emoji: '💪',
                mass: 45,
                description: 'Build healthy habits and reach your fitness goals',
                subPoints: [
                    { emoji: '🏃', description: 'Run for 30 minutes', progress: '12/15 sessions' },
                    { emoji: '💧', description: 'Drink 8 glasses of water', progress: '8/10 today' }
                ]
            },
            {
                id: 2,
                name: 'Learning Spanish',
                emoji: '📚',
                mass: 30,
                description: 'Master Spanish through daily practice',
                subPoints: [
                    { emoji: '📖', description: 'Study vocabulary for 20 mins', progress: '5/30 chapters' },
                    { emoji: '🎧', description: 'Listen to Spanish podcast', progress: '3/15 episodes' }
                ]
            },
            {
                id: 3,
                name: 'Save for Vacation',
                emoji: '🏖️',
                mass: 15,
                description: 'Build your vacation fund one dollar at a time',
                subPoints: [
                    { emoji: '💰', description: 'Save $50 today', progress: '2/30 days' }
                ]
            }
        ];

        let currentIsle = null;

        // Render Isles
        function renderIsles() {
            const grid = document.getElementById('isleGrid');
            grid.innerHTML = isles.map(isle => `
                <div class="isle-card" onclick="openIsle(${isle.id})">
                    <div class="isle-header">
                        <div class="isle-emoji">${isle.emoji}</div>
                        <div class="isle-mass">⚡ ${isle.mass} mass</div>
                    </div>
                    <div class="isle-name">${isle.name}</div>
                    <div class="isle-description">${isle.description}</div>
                    <div class="isle-stats">
                        <div class="stat">📊 ${isle.subPoints.length} tasks</div>
                        <div class="stat">🔥 Active</div>
                    </div>
                </div>
            `).join('');
        }

        // Open Isle Modal
        function openIsle(id) {
            currentIsle = isles.find(isle => isle.id === id);
            if (!currentIsle) return;

            document.getElementById('modalTitle').textContent = `${currentIsle.emoji} ${currentIsle.name}`;
            document.getElementById('modalSubtitle').textContent = `⚡ ${currentIsle.mass} mass`;
            
            // Render sub-points
            const subPointsList = document.getElementById('subPointsList');
            subPointsList.innerHTML = currentIsle.subPoints.map(subPoint => `
                <div class="sub-point-item">
                    <div class="sub-point-emoji">${subPoint.emoji}</div>
                    <div class="sub-point-content">
                        <div class="sub-point-description">${subPoint.description}</div>
                        <div class="sub-point-progress">${subPoint.progress}</div>
                    </div>
                    <button class="sub-point-button" onclick="fillSubPoint('${subPoint.description}')">✓ Fill</button>
                </div>
            `).join('');

            document.getElementById('modalOverlay').classList.add('active');
        }

        // Close Modal
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            currentIsle = null;
        }

        // Close modal when clicking outside
        function closeModalOutside(event) {
            if (event.target.id === 'modalOverlay') {
                closeModal();
            }
        }

        // Fill Sub-point
        function fillSubPoint(description) {
            // In a real app, this would update the database
            alert(`✓ Filled: ${description}\n\n+1 Mass added! 🎉`);
            
            // Update mass in local data (for demo purposes)
            if (currentIsle) {
                currentIsle.mass += 1;
                document.getElementById('modalSubtitle').textContent = `⚡ ${currentIsle.mass} mass`;
                renderIsles();
            }
        }

        // Create New Isle
        function createIsle() {
            const name = prompt('Enter your new isle name:');
            if (!name) return;

            const emoji = prompt('Choose an emoji for your isle:', '🎯');
            const defaultEmoji = emoji || '🎯';

            const newIsle = {
                id: isles.length + 1,
                name: name,
                emoji: defaultEmoji,
                mass: 1,
                description: 'Your new journey begins here!',
                subPoints: [
                    { emoji: '🎯', description: 'First task', progress: '0/1 sessions' }
                ]
            };

            isles.push(newIsle);
            renderIsles();
            
            alert(`🎉 Created "${name}"!\n\nStarting with 1 mass. Build it up by completing daily tasks!`);
        }

        // Open Chat
        function openChat() {
            if (!currentIsle) return;
            alert(`💬 Chat: ${currentIsle.emoji} ${currentIsle.name}\n\nChat would open here in the full app.\n\nFeatures:\n- Group messaging\n- Image sharing\n- Emoji reactions\n- Task completion celebrations`);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderIsles();
            console.log('🏝️ Goal Isle loaded successfully!');
            console.log('Mockup mode - all features working!');
        });
    </script>
</body>
</html>
