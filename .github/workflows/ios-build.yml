name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    # macos-26 ships with Xcode 26 + iOS 26 SDK, which Apple now requires
    # (since April 2026) for all App Store Connect / TestFlight uploads.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Find the newest Xcode 26.x installed on the runner and select it.
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | head -1)/Contents/Developer"
          echo "Selected: $(xcodebuild -version)"
          # Accept the license + run first-launch setup. This installs/links
          # the iOS 26 platform components that the storyboard compiler and
          # xcodebuild need. Without it, builds fail with:
          #   "iOS 26.0 Platform Not Installed"
          sudo xcodebuild -license accept
          sudo xcodebuild -runFirstLaunch
          echo "=== available SDKs ==="
          xcodebuild -showsdks | grep -i ios || echo "NO iOS SDK FOUND"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Set up code signing
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          set -e
          echo "=== openssl version ==="
          openssl version
          echo "=== security tool ==="
          security -h > /dev/null 2>&1 && echo "security OK"

          # ---- Decrypt signing materials ----
          echo "--- decrypting key.enc ---"
          openssl enc -aes-256-cbc -d -in key.enc -out ios_key.pem -pass pass:"$CERT_PASSWORD"
          echo "--- decrypting cer.enc ---"
          openssl enc -aes-256-cbc -d -in cer.enc -out ios_cert.cer -pass pass:"$CERT_PASSWORD"
          echo "--- decrypting profile.enc ---"
          openssl enc -aes-256-cbc -d -in profile.enc -out profile.mobileprovision -pass pass:"$CERT_PASSWORD"
          echo "decrypted: key=$(wc -c < ios_key.pem)B cert=$(wc -c < ios_cert.cer)B profile=$(wc -c < profile.mobileprovision)B"

          # Convert DER cert -> PEM, then build a macOS-compatible P12.
          # CRITICAL: OpenSSL 3.x (3.6.2 on macos-26) defaults to SHA256 MAC
          # + AES-256 encryption, but macOS's `security` tool only supports
          # SHA1 MAC + PBE-SHA1-3DES. Without these flags, import fails with
          # "MAC verification failed during PKCS12 import (wrong password?)".
          # 3DES is in OpenSSL's default provider — no legacy provider needed.
          echo "--- building P12 ---"
          openssl x509 -in ios_cert.cer -inform DER -out ios_cert.pem -outform PEM
          openssl pkcs12 -export \
            -out cert.p12 \
            -inkey ios_key.pem \
            -in ios_cert.pem \
            -passout pass:"$CERT_PASSWORD" \
            -name "Apple Distribution: JASPER HOLIMAN DEEN (3X37886R5C)" \
            -certpbe PBE-SHA1-3DES \
            -keypbe PBE-SHA1-3DES \
            -macalg sha1

          echo "cert.p12: $(wc -c < cert.p12) bytes"
          openssl pkcs12 -in cert.p12 -noout -passin pass:"$CERT_PASSWORD" && echo "P12 OK" || { echo "P12 FAIL"; exit 1; }

          # ---- Dedicated keychain (canonical CI approach) ----
          # Put the keychain in a STABLE path (not $RUNNER_TEMP which can vary
          # between steps) so the build step can re-unlock it.
          KEYCHAIN_PATH="$HOME/build.keychain-db"
          KEYCHAIN_PASS=ci-keychain-pass
          echo "--- creating keychain at $KEYCHAIN_PATH ---"
          # Remove any stale keychain from a prior run
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          # No auto-lock during the build
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          # Add to the search list (codesign searches the LIST, not default)
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Import cert + allow codesign to use the private key.
          echo "--- importing cert into keychain ---"
          security import cert.p12 -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          echo "--- setting partition list ---"
          # -s makes the keychain prompt for access; since we're non-interactive
          # the -k provides the password. This grants codesign access to the key.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # ---- Install provisioning profile ----
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          echo "PROFILE_UUID=$PROFILE_UUID"

          # ---- Verify the signing identity is usable BEFORE the build ----
          echo "=== keychain search list ==="
          security list-keychains -d user
          echo "=== default keychain ==="
          security default-keychain
          echo "=== available signing identities (all keychains) ==="
          security find-identity -v -p codesigning
          echo "=== available signing identities (build keychain only) ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No 'Apple Distribution' signing identity found in any keychain."
            exit 1
          fi
          echo "Will sign with: $IDENTITY"

          # Save keychain path + pass for the build step
          echo "$KEYCHAIN_PATH" > /tmp/keychain_path
          echo "$KEYCHAIN_PASS" > /tmp/keychain_pass

          # ---- Export options ----
          cat > ios/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.jasperdeen.goalisle</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS (signed)
        run: |
          set -e
          # Re-establish the keychain in THIS step's shell.
          KEYCHAIN_PATH=$(cat /tmp/keychain_path)
          KEYCHAIN_PASS=$(cat /tmp/keychain_pass)
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "=== keychain search list ==="
          security list-keychains -d user
          echo "=== identities visible to xcodebuild ==="
          security find-identity -v -p codesigning
          IDENTITY=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No 'Apple Distribution' identity visible in the keychain search list."
            exit 1
          fi
          echo "Will sign with: $IDENTITY"

          # Two-phase build to bypass Flutter's signing pre-validation:
          # 1. Archive WITHOUT codesign (Flutter won't try to validate certs)
          # 2. Export the archive WITH codesign (xcodebuild handles signing
          #    directly using the keychain + exportOptions.plist)
          # This is the canonical CI approach and avoids Flutter's
          # "No valid code signing certificates" pre-check that fails even
          # when the identity is present.
          flutter build ios --release --no-codesign

          # Find the xcarchive Flutter created
          ARCHIVE_PATH=$(find build -name "*.xcarchive" -type d | head -1)
          echo "Found archive: $ARCHIVE_PATH"
          if [ -z "$ARCHIVE_PATH" ]; then
            echo "ERROR: No .xcarchive found in build/"
            find build -name "*.xcarchive" -o -name "*.app" 2>/dev/null | head -10
            exit 1
          fi

          echo "=== exporting signed IPA ==="
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath build/ios/ipa \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

          echo "=== IPA built ==="
          ls -la build/ios/ipa/*.ipa

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GoalIsle-iOS
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        if: success()
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.private_keys
          # altool requires the private key as an unencrypted PEM file named
          # AuthKey_<KEY_ID>.p8 in ~/.private_keys. Use printf with explicit
          # trailing newline — GitHub secrets UI can strip trailing newlines,
          # and altool fails on a key without a final newline.
          printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          chmod 600 ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

          # Diagnostic: verify the key file is well-formed (without leaking it)
          echo "Key file size: $(wc -c < ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8) bytes"
          echo "Key first line: $(head -1 ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8)"
          echo "Key last line:  $(tail -1 ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8)"
          echo "Issuer ID: $APP_STORE_CONNECT_ISSUER_ID"
          echo "Key ID:    $APP_STORE_CONNECT_KEY_ID"

          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          echo "Uploading $IPA_PATH to TestFlight..."

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format normal
