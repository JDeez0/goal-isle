name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Rebuild P12 on macOS and set up signing
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          # Decrypt raw key + cert
          openssl enc -aes-256-cbc -d -in key.enc -out ios_key.pem -pass pass:"$CERT_PASSWORD"
          openssl enc -aes-256-cbc -d -in cer.enc -out ios_cert.cer -pass pass:"$CERT_PASSWORD"

          # Convert cer to pem
          openssl x509 -in ios_cert.cer -inform DER -out ios_cert.pem -outform PEM

          # Build P12 ON macOS (uses macOS's openssl, which produces macOS-compatible format)
          openssl pkcs12 -export \
            -out cert.p12 \
            -inkey ios_key.pem \
            -in ios_cert.pem \
            -passout pass:"$CERT_PASSWORD" \
            -name "GoalIsle Distribution"

          echo "cert.p12: $(wc -c < cert.p12) bytes"
          openssl pkcs12 -in cert.p12 -noout -passin pass:"$CERT_PASSWORD" && echo "P12 OK" || echo "P12 FAIL"

          # Decrypt provisioning profile
          openssl enc -aes-256-cbc -d -in profile.enc -out profile.mobileprovision -pass pass:"$CERT_PASSWORD"

          # Create keychain and import
          security create-keychain -p "goalisle" build.keychain-db
          security default-keychain -s build.keychain-db
          security unlock-keychain -p "goalisle" build.keychain-db
          security set-keychain-settings -t 3600 -u build.keychain-db

          security import cert.p12 -k build.keychain-db -P "$CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "goalisle" build.keychain-db

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          # Get cert CN and profile UUID
          CERT_NAME=$(security find-certificate -a build.keychain-db -p | openssl x509 -noout -subject | sed 's/subject= //;s/CN=//' | head -1)
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          echo "CERT_NAME=$CERT_NAME"
          echo "PROFILE_UUID=$PROFILE_UUID"

          # Write exportOptions.plist
          cat > ios/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.jasperdeen.goalisle</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>${CERT_NAME}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS (signed)
        run: flutter build ipa --release

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          echo "Uploading $IPA_PATH to TestFlight..."

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoalIsle-iOS
          path: build/ios/ipa/*.ipa
