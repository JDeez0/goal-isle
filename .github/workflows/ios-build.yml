name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Set up code signing
        env:
          IOS_P12_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Create a temporary keychain
          security create-keychain -p "goalisle" build.keychain-db
          security default-keychain -s build.keychain-db
          security unlock-keychain -p "goalisle" build.keychain-db
          security set-keychain-settings -t 3600 -u build.keychain-db

          # Decode and import the .p12 certificate
          # Use printf to avoid echo adding newlines, and -D for macOS base64
          printf '%s' "$IOS_P12_BASE64" | base64 -D > cert.p12
          echo "cert.p12 size: $(wc -c < cert.p12) bytes"

          # Verify the P12 password locally before importing
          openssl pkcs12 -in cert.p12 -noout -passin pass:"$IOS_P12_PASSWORD" 2>&1 || true

          security import cert.p12 -k build.keychain-db -P "$IOS_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security

          # Allow codesign to access the key
          security set-key-partition-list -S apple-tool:,apple: -s -k "goalisle" build.keychain-db

          # Decode and install the provisioning profile
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > GoalIsle.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp GoalIsle.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

          # Get the certificate name (CN)
          CERT_NAME=$(security find-certificate -a build.keychain-db -p | openssl x509 -noout -subject | sed 's/subject= //;s/CN=//' | head -1)
          echo "Certificate name: $CERT_NAME"
          echo "CERT_NAME=$CERT_NAME" >> $GITHUB_ENV

          # Get the provisioning profile UUID
          PROFILE_UUID=$(security cms -D -i GoalIsle.mobileprovision | plutil -extract UUID raw -)
          echo "Profile UUID: $PROFILE_UUID"

          # Create exportOptions.plist
          cat > ios/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.jasperdeen.goalisle</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>signingCertificate</key>
            <string>$CERT_NAME</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS (signed)
        run: flutter build ipa --release

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          echo "Uploading $IPA_PATH to TestFlight..."

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoalIsle-iOS
          path: build/ios/ipa/*.ipa
