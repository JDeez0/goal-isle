name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    # macos-26 ships with Xcode 26 + iOS 26 SDK, which Apple now requires
    # (since April 2026) for all App Store Connect / TestFlight uploads.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Set up Xcode 26 + iOS platform
        run: |
          set -e
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | head -1)/Contents/Developer"
          echo "Selected: $(xcodebuild -version)"
          sudo xcodebuild -license accept

          # Ensure the iOS 26 platform is fully installed. The SDK ships with
          # Xcode but the platform bundle must be registered/downloaded.
          # Try downloadPlatform first; fall back to runFirstLaunch.
          sudo xcodebuild -downloadPlatform iOS 2>&1 || sudo xcodebuild -runFirstLaunch

          echo "=== available SDKs ==="
          xcodebuild -showsdks | grep -i ios

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Set up code signing
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          set -e
          echo "=== openssl version ==="
          openssl version

          # ---- Decrypt signing materials ----
          openssl enc -aes-256-cbc -d -in key.enc -out ios_key.pem -pass pass:"$CERT_PASSWORD"
          openssl enc -aes-256-cbc -d -in cer.enc -out ios_cert.cer -pass pass:"$CERT_PASSWORD"
          openssl enc -aes-256-cbc -d -in profile.enc -out profile.mobileprovision -pass pass:"$CERT_PASSWORD"
          echo "decrypted: key=$(wc -c < ios_key.pem)B cert=$(wc -c < ios_cert.cer)B profile=$(wc -c < profile.mobileprovision)B"

          # ---- Build macOS-compatible P12 ----
          # OpenSSL 3.x defaults to SHA256 MAC; macOS security needs SHA1+3DES.
          openssl x509 -in ios_cert.cer -inform DER -out ios_cert.pem -outform PEM
          openssl pkcs12 -export \
            -out cert.p12 \
            -inkey ios_key.pem \
            -in ios_cert.pem \
            -passout pass:"$CERT_PASSWORD" \
            -name "Apple Distribution: JASPER HOLIMAN DEEN (3X37886R5C)" \
            -certpbe PBE-SHA1-3DES \
            -keypbe PBE-SHA1-3DES \
            -macalg sha1

          echo "cert.p12: $(wc -c < cert.p12) bytes"
          openssl pkcs12 -in cert.p12 -noout -passin pass:"$CERT_PASSWORD" && echo "P12 OK" || { echo "P12 FAIL"; exit 1; }

          # ---- Dedicated keychain ----
          KEYCHAIN_PATH="$HOME/build.keychain-db"
          KEYCHAIN_PASS=ci-keychain-pass
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Import cert + set partition list
          security import cert.p12 -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # ---- Install provisioning profile ----
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          echo "PROFILE_UUID=$PROFILE_UUID"

          # ---- Verify identity ----
          echo "=== signing identities ==="
          security find-identity -v -p codesigning

          # Save for build step
          echo "$KEYCHAIN_PATH" > /tmp/keychain_path
          echo "$KEYCHAIN_PASS" > /tmp/keychain_pass

          # ---- Export options ----
          cat > ios/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>3X37886R5C</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.jasperdeen.goalisle</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS (archive + export)
        run: |
          set -e
          KEYCHAIN_PATH=$(cat /tmp/keychain_path)
          KEYCHAIN_PASS=$(cat /tmp/keychain_pass)
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "=== identities ==="
          security find-identity -v -p codesigning

          # Two-phase build to bypass Flutter's signing pre-validation,
          # which fails intermittently on macos-26 runners even when the
          # cert IS in the keychain (the error is a false negative caused
          # by Xcode destination resolution, not a real signing problem).

          # Phase 1: Compile Dart + generate Xcode artifacts WITHOUT
          # running xcodebuild. --config-only skips the build entirely.
          flutter build ios --release --no-codesign --config-only

          # Phase 2: Archive with xcodebuild directly. -sdk iphoneos
          # bypasses destination resolution (no "iOS 26.0 is not installed").
          # CODE_SIGNING_ALLOWED=NO means no signing during archive —
          # we sign in the export step.
          echo "=== archiving ==="
          mkdir -p build/ios/archive
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/archive/Runner.xcarchive \
            -sdk iphoneos \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          ARCHIVE_PATH="build/ios/archive/Runner.xcarchive"
          if [ ! -d "$ARCHIVE_PATH" ]; then
            echo "ERROR: Archive not created"
            exit 1
          fi
          echo "Archive: $ARCHIVE_PATH"

          # Phase 3: Export signed IPA from the archive.
          echo "=== exporting signed IPA ==="
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportOptionsPlist ios/exportOptions.plist \
            -exportPath build/ios/ipa \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          echo "IPA: $IPA_PATH ($(wc -c < "$IPA_PATH") bytes)"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GoalIsle-iOS
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        if: success()
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -e
          mkdir -p ~/.private_keys
          printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          chmod 600 ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          echo "IPA: $IPA_PATH ($(wc -c < "$IPA_PATH") bytes)"

          # Validate the IPA. Capture exit code — altool can print errors
          # but return 0, so check for "VERIFY FAILED" in output too.
          echo "=== validating IPA ==="
          VAL_OUTPUT=$(xcrun altool --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format normal 2>&1) || true
          echo "$VAL_OUTPUT"
          if echo "$VAL_OUTPUT" | grep -qi "failed\|error"; then
            echo "=== VALIDATION FAILED — not uploading ==="
            exit 1
          fi
          echo "=== validation passed, uploading ==="
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format normal
