name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Write API key and fetch signing
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

          # Create the API key JSON for notarytool/altool
          KEY_CONTENT=$(cat ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8)
          cat > ~/api_key.json << 'ENDJSON'
          {
            "key_id": "$APP_STORE_CONNECT_KEY_ID",
            "issuer_id": "$APP_STORE_CONNECT_ISSUER_ID",
            "key": "$KEY_CONTENT",
            "in_house": false
          }
          ENDJSON

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          mkdir -p build/ipa
          cd build/ios/iphoneos
          zip -r ../../ipa/GoalIsle-unsigned.ipa Runner.app

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoalIsle-iOS
          path: build/ipa/*.ipa

