name: Build iOS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    # macos-26 ships with Xcode 26 + iOS 26 SDK, which Apple now requires
    # (since April 2026) for all App Store Connect / TestFlight uploads.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Find the newest Xcode 26.x installed on the runner and select it.
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | head -1)/Contents/Developer"
          echo "Selected: $(xcodebuild -version)"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Set up code signing
        env:
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          # ---- Decrypt signing materials ----
          openssl enc -aes-256-cbc -d -in key.enc -out ios_key.pem -pass pass:"$CERT_PASSWORD"
          openssl enc -aes-256-cbc -d -in cer.enc -out ios_cert.cer -pass pass:"$CERT_PASSWORD"
          openssl enc -aes-256-cbc -d -in profile.enc -out profile.mobileprovision -pass pass:"$CERT_PASSWORD"

          # Convert DER cert -> PEM, then build a macOS-compatible P12.
          # The cert's actual CN is "Apple Distribution: JASPER HOLIMAN DEEN
          # (3X37886R5C)" — the P12 friendly name should match so codesign
          # can find it by the CODE_SIGN_IDENTITY "Apple Distribution".
          openssl x509 -in ios_cert.cer -inform DER -out ios_cert.pem -outform PEM
          openssl pkcs12 -export \
            -out cert.p12 \
            -inkey ios_key.pem \
            -in ios_cert.pem \
            -passout pass:"$CERT_PASSWORD" \
            -name "Apple Distribution: JASPER HOLIMAN DEEN (3X37886R5C)"

          echo "cert.p12: $(wc -c < cert.p12) bytes"
          openssl pkcs12 -in cert.p12 -noout -passin pass:"$CERT_PASSWORD" && echo "P12 OK" || { echo "P12 FAIL"; exit 1; }

          # ---- Dedicated keychain (canonical CI approach) ----
          # login.keychain on GitHub runners has an unreliable password and
          # set-key-partition-list often fails silently. A dedicated keychain
          # with a known password eliminates that flakiness entirely.
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASS=ci-keychain-pass
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Import cert + allow codesign to use the private key.
          security import cert.p12 -k "$KEYCHAIN_PATH" -P "$CERT_PASSWORD" -A -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # ---- Install provisioning profile ----
          # The committed pbxproj uses PROVISIONING_PROFILE_SPECIFIER =
          # "GoalIsle Distribution", so Xcode resolves the profile by name
          # from the installed profiles — no UUID injection needed.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          echo "PROFILE_UUID=$PROFILE_UUID"

          # ---- Verify the signing identity is usable BEFORE the build ----
          echo "=== available signing identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          # ---- Export options ----
          # signingCertificate must match the cert's CN prefix. The cert is
          # "Apple Distribution: ..." so we use "Apple Distribution" (NOT the
          # old "iPhone Distribution" — Apple renamed it years ago).
          cat > ios/exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.jasperdeen.goalisle</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Build iOS (signed)
        run: flutter build ipa --release --export-options-plist=ios/exportOptions.plist

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GoalIsle-iOS
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        if: success()
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.private_keys
          # altool requires the private key as an unencrypted PEM file named
          # AuthKey_<KEY_ID>.p8 in ~/.private_keys. Use printf with explicit
          # trailing newline — GitHub secrets UI can strip trailing newlines,
          # and altool fails on a key without a final newline.
          printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          chmod 600 ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8

          # Diagnostic: verify the key file is well-formed (without leaking it)
          echo "Key file size: $(wc -c < ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8) bytes"
          echo "Key first line: $(head -1 ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8)"
          echo "Key last line:  $(tail -1 ~/.private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8)"
          echo "Issuer ID: $APP_STORE_CONNECT_ISSUER_ID"
          echo "Key ID:    $APP_STORE_CONNECT_KEY_ID"

          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -1)
          echo "Uploading $IPA_PATH to TestFlight..."

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format normal
